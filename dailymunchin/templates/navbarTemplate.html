<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Navbar Template</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- Latest compiled and minified CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="">
        <!-- Latest compiled JavaScript -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		
		<!--YOU CAN REMOVE THIS STYLE: IT IS ONLY HERE FOR TESTING THE 'sticky-top' (sticky position) OF THE HEADER-->
		<style>
			body {
				height: 1000px;
			}
		</style>
    </head>
    <body>
        <header class="sticky-top shadow">
            <nav class="navbar navbar-expand-md bg-white">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">
                        <img src="images/dailymunch_logo.PNG" alt="DailyMunch-logo" style="height: 80px;">
                    </a>
                    <button class="btn navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#collapsibleNavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="offcanvas offcanvas-top" id="collapsibleNavbar" style="height: 100vh;">
                        <div class="offcanvas-header">
                            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                        </div>
                        <div class="offcanvas-body justify-content-end mx-5">
                            <ul class="navbar-nav">
                                <li class="nav-item">
                                    <a class="nav-link" href="/dashboard">Dashboard</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="/find-food">Find Food</a>
                                </li>    
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>
        </header>

		<!--YOU CAN REMOVE THIS AS WELL-->
		<div class="container">
			<h1>Sample Title</h1>
			<p>Here is a sample paragraph.</p>
			<p>Here is a another sample paragraph.</p>
		</div>
    </body>
</html>
