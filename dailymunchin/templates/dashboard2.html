<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
  	<title>My Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap 5 Font Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<!-- Latest compiled JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
	<!--HEADER-->
	<header class="sticky-top shadow">
		<nav class="navbar navbar-expand-md bg-white">
			<div class="container-fluid">
				<a class="navbar-brand" href="/">
					<img src="{{ url_for('static', filename='images/logo.PNG') }}" alt="DailyMunch-logo" style="height: 64px;">
				</a>
				<button class="btn navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#collapsibleNavbar">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="offcanvas offcanvas-top" id="collapsibleNavbar" style="height: 100vh;">
					<div class="offcanvas-header">
						<button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
					</div>
					<div class="offcanvas-body justify-content-end mx-5">
						<ul class="navbar-nav" style="font-size: 1.44rem;">
							<li class="nav-item" style="margin-right: 20px;">
								<a class="nav-link" href="/dashboard">Dashboard</a>
							</li>
							<li class="nav-item">
								<a class="nav-link" href="/find-food">Find Food</a>
							</li>    
						</ul>
					</div>
				</div>
			</div>
		</nav>
	</header>
	<!--HEADER-->

	<div class="container mt-4 mb-5">

		<h2 class="mb-3" style="color: #22b14c">My Dashboard</h2>

		<!-- Dropdown -->
		<select id="viewSelect" class="form-select" style="width: 200px; margin-bottom: 20px;">
			<option value="daily">Today</option>
			<option value="weekly">Last 7 Days</option>
		</select>

		<!-- 
		<ul class="nav nav-tabs" role="tablist">
			<li class="nav-item">
				<a class="nav-link active" data-bs-toggle="tab" href="#home" style="color: #22b14c">Trackings</a>
			</li>
			<li class="nav-item">
				<a class="nav-link" data-bs-toggle="tab" href="#macro" style="color: #22b14c">Macronutrients</a>
			</li>
		</ul>
		Nav tabs -->
		
		<!-- Tab panes -->
		<div class="container" style="overflow-y: hidden;">
			<div id="home" class="container"><br>
				<select id="nutrientSelect" class="form-select" style="width: 300px; margin-bottom: 20px;">
				{% for n_name in nutrient_name_labels %}
					<option value="{{ n_name }}">{{ n_name }} ({{ nutrient_unit_labels[loop.index0] }})</option>
				{% endfor %}
				</select>

				<div class="d-flex justify-content-center" style="width: 100%; height: 600px;">
					<!--Line Graph container -->
					<div id="caloriePlot" style="width:100%; height: 100%;"></div>
				</div>
				<div class="container mt-4 mb-5">
					<p><i>2,000 calories a day is used for general nutrition advice, but calorie needs vary.</i></p>
				</div>
			</div>
			
			<div id="macro" class="container"><br>
				<div class="d-flex justify-content-center" style="width: 100%; height: 600px;">
					<!--Pie Chart container -->
					<div id="pieChart" style="width:100%; height: 100%;"></div>
				</div>
				<div>
					<h3 class="my-3" style="color:#22b14c;">Healthy Ranges (in general)</h3>
					<p>Carbohydrates: 45–65%</p>
					<p>Protein: 10–35%</p>
					<p>Fat: 20–35%</p>
				</div>
			</div>
			
		</div>

	</div>

<script>
  
	const data = {{ food_tracking_data | default([]) | tojson }};

	// Get today's date in YYYY-MM-DD format
	const today = new Date().toISOString().split("T")[0];
	console.log("Today's date: ", today);

	const currentDay = data.find(day => day.date === today);
	if (currentDay) 
	{
		console.log("currentDay: ", currentDay);
	}
	

	const weeklyDict = data.reduce((acc, item) => {
	  acc[item.date] = item.food_items;  // key = date, value = food_items array
	  return acc;
	}, {});

	console.log(weeklyDict);
	
	// =========================
	// HELPERS
	// =========================

	function getNutrient(foodRecord, nutrientName) {
		const c = foodRecord.nutrients.find(n => n.name === nutrientName);
		return c ? c.value : 0;
	}

	function buildDailyData(nutrientName) {
		const xPoints = [];
		const yPoints = [];

		// Loop through data and only include today's entries
		data.forEach(day => {
			if (day.date === today) {
				console.log(day.date);
				day.food_items.forEach(item => {
					xPoints.push(`${day.date}T${item.time}`);
					yPoints.push(getNutrient(item, nutrientName));
				});
			}
		});

		return { xPoints, yPoints };
	}
	
	
	function buildWeeklyData(nutrientName) {
		const days = Object.keys(weeklyDict).sort();
		
		const totals = days.map(day => {
			const values = weeklyDict[day].map(item => getNutrient(item, nutrientName));
			return values.reduce((a, b) => a + b, 0);
		});
		
		return { days, totals };
	}
	
	
  // =========================
  // RENDER
  // =========================

  function renderGraph() {
    const view = document.getElementById("viewSelect").value;
	const selectedNutrient = document.getElementById("nutrientSelect");
    const nutrient = selectedNutrient.value;
	const selectedText = selectedNutrient.options[selectedNutrient.selectedIndex].text;

	const config = {
		responsive: true,
		displaylogo: false,
		modeBarButtonsToRemove: [
			'lasso2d',
			'select2d',
			'autoScale2d'
		]
	};

    if (view === "daily") {
      const { xPoints, yPoints } = buildDailyData(nutrient);
	  console.log("x: ", xPoints);
	  console.log("y: ", yPoints);

      Plotly.newPlot("caloriePlot", [{
        x: xPoints,
        y: yPoints,
        mode: "lines+markers",
        type: "scatter",
        name: nutrient,
		line: {
			color: '#22b14c',
			width: 3
		},
		marker: {
			size: 8,
			color: '#1e6132'
		}
      }], {
        title: `Daily ${nutrient}`,
		xaxis: { title: "Time", type: "date", tickformat: "%-I:%M:%S %p" }, // %-I = hour (1-12), %M = minutes, %p = AM/PM 
        yaxis: { title: selectedText }
      }, config);

    } else {
      const { days, totals } = buildWeeklyData(nutrient);

      Plotly.newPlot("caloriePlot", [{
        x: days,
        y: totals,
        mode: "lines+markers",
        type: "scatter",
        name: `Total ${nutrient}`,
		line: {
			color: '#22b14c',
			width: 3
		},
		marker: {
			size: 8,
			color: '#1e6132'
		}
      }], {
        title: `Weekly ${nutrient}`,
        xaxis: { title: "Dates", type: "date", tickformat: "%b %d" },
        yaxis: { title: selectedText }
      }, config);
    }
  }

</script>

<script>

	function getDailyMacros(day) {
		let totalProtein = 0;
		let totalCarbs = 0;
		let totalFats = 0;

		day.food_items.forEach(item => {
			totalProtein += getNutrient(item, "Protein");
			totalCarbs += getNutrient(item, "Carbohydrate, by difference");
			totalFats += getNutrient(item, "Total lipid (fat)");
		});

		//	console.log("Total Protein: ", totalProtein);
		//	console.log("Total Carbohydrates: ", totalCarbs);
		//	console.log("Total Fats: ", totalFats);

		// convert grams to calories using the 4-4-9 rule (protein and carbs = 4 calories/gram, fats = 9 calories/gram)
		totalProtein *= 4; 
		totalCarbs *= 4;
		totalFats *= 9;

		//	console.log("Total Protein (calories): ", totalProtein);
		//	console.log("Total Carbohydrates (calories): ", totalCarbs);
		//	console.log("Total Fats (calories): ", totalFats);

		return [totalProtein, totalCarbs, totalFats];
	}

	function buildMacroPieChart(chartId, chartTitle, totalProtein, totalCarbs, totalFats) {
		const config = {
			responsive: true,
			displaylogo: false,
			modeBarButtonsToRemove: [
				'lasso2d',
				'select2d',
				'autoScale2d'
			]
		};

		// Macronutrient data
		const pieData = [{
			type: "pie",
			labels: ["Protein", "Carbohydrates", "Fats"],
			values: [totalProtein, totalCarbs, totalFats], // in grams
			textinfo: "label+percent",
			textfont: { size: 18 },
			hoverinfo: "label+value+percent",
			textposition: "inside",
			marker: {
				colors: ["#1e6132", "#22b14c", "#a8e61d"]
			}
		}];

		const layout = {
			title: chartTitle,
			showlegend: false
		};

		Plotly.newPlot(chartId, pieData, layout, config);
	}

	function renderPieChart() {
		const view = document.getElementById("viewSelect").value;
		if (view === "daily") {
			//TODAY MACRONUTRIENT PIE CHART
			
			console.log("TODAY PIE CHART:");
			console.log(currentDay.food_items);

			let totalMacros = getDailyMacros(currentDay);

			console.log("Today's total macros (Protein): ", totalMacros[0]);
			console.log("Today's total macros (Carbohydrates): ", totalMacros[1]);
			console.log("Today's total macros (Fats): ", totalMacros[2]);

			buildMacroPieChart("pieChart", "Macronutrients Distribution (Today)", ...totalMacros);
		} 
		else {
			// WEEKLY MACRONUTRIENT PIE CHART

			proteinMacro7Days = []
			carbsMacro7Days = []
			fatsMacro7Days = []

			data.forEach(day => {
				let [p, c, f] = getDailyMacros(day);
				proteinMacro7Days.push(p);
				carbsMacro7Days.push(c);
				fatsMacro7Days.push(f);
			});

			console.log("7-day protein macros: ", proteinMacro7Days);
			console.log("7-day carbs macros: ", carbsMacro7Days);
			console.log("7-day fats macros: ", fatsMacro7Days);

			const avgProtein = proteinMacro7Days.reduce((sum, val) => sum + val, 0) / proteinMacro7Days.length;
			console.log("Average Protein (calories): ", avgProtein);

			const avgCarbs = carbsMacro7Days.reduce((sum, val) => sum + val, 0) / carbsMacro7Days.length;
			console.log("Average Carbohydrates (calories): ", avgCarbs);

			const avgFats = fatsMacro7Days.reduce((sum, val) => sum + val, 0) / fatsMacro7Days.length;
			console.log("Average Fats (calories): ", avgFats);

			buildMacroPieChart("pieChart", "Average Macronutrients Distribution (7 Days)", avgProtein, avgCarbs, avgFats);
		}
	}

</script>

<script>
	// =========================
	// EVENTS
	// =========================

	document.getElementById("viewSelect").addEventListener("change", renderGraph);
	document.getElementById("viewSelect").addEventListener("change", renderPieChart);
	document.getElementById("nutrientSelect").addEventListener("change", renderGraph);

	renderGraph();
	renderPieChart();
</script>

</body>
</html>
