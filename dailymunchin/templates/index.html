<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Munchin</title>
	
	<!-- Latest compiled and minified CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	
	<!-- Bootstrap 5 Font Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	
	<!-- Latest compiled JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<style>
		.table.table-striped {
			--bs-table-hover-bg: #ffe8a1;
		}
    </style>
</head>
<body>
	<!--HEADER-->
	<header class="sticky-top shadow">
		<nav class="navbar navbar-expand-md bg-white">
			<div class="container-fluid">
				<a class="navbar-brand" href="/">
					<img src="{{ url_for('static', filename='images/logo.PNG') }}" alt="DailyMunch-logo" style="height: 64px;">
				</a>
				<button class="btn navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#collapsibleNavbar">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="offcanvas offcanvas-top" id="collapsibleNavbar" style="height: 100vh;">
					<div class="offcanvas-header">
						<button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
					</div>
					<div class="offcanvas-body justify-content-end mx-5">
						<ul class="navbar-nav" style="font-size: 1.44rem;">
							<li class="nav-item" style="margin-right: 20px;">
								<a class="nav-link" href="/dashboard">Dashboard</a>
							</li>
							<li class="nav-item">
								<a class="nav-link" href="/find-food">Find Food</a>
							</li>    
						</ul>
					</div>
				</div>
			</div>
		</nav>
	</header>
	<!--HEADER-->
    <main>
        <div class="container mt-5">
			<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
				<h1 style="color:#22b14c;">Welcome to DailyMunchin!</h1>
			</div>
        </div>
    </main>
</body>
</html>
